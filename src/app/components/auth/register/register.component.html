<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>Benutzername</mat-label>
    <input matInput id="username" formControlName="username">
  </mat-form-field>
  <mat-form-field>
    <mat-label>E-Mail</mat-label>
    <input matInput id="email" formControlName="email">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Passwort</mat-label>
    <input type="password" matInput id="password" formControlName="password">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Passwort wiederholen</mat-label>
    <input type="password" matInput id="passwordRepeat" formControlName="passwordRep">
  </mat-form-field>
  <button type="submit" mat-raised-button color="primary" class="m-2" style="width: 150px;">registrieren</button>
</form>
